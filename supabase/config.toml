project_id = "testlab"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
schema_paths = []

[db.seed]
enabled = true
sql_paths = ["./seed/*.sql"]

[realtime]
enabled = true
ip_version = "IPv4"

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:8080"
additional_redirect_urls = ["http://localhost:8080"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[edge_runtime]
enabled = true
policy = "per_worker"
deno_version = 2

[edge_runtime.secrets]
OPENAI_API_KEY = "env(OPENAI_API_KEY)"
OPENAI_EMBEDDING_MODEL = "env(OPENAI_EMBEDDING_MODEL)"
OPENAI_CHAT_MODEL = "env(OPENAI_CHAT_MODEL)"
ANTHROPIC_API_KEY = "env(ANTHROPIC_API_KEY)"
GOOGLE_API_KEY = "env(GOOGLE_API_KEY)"

[functions.validate-item]
verify_jwt = false

[functions.ingest-document]
verify_jwt = false
